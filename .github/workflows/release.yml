name: Build and Release

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
      - 'memory-bank/**'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build with PyInstaller (Windows)
      if: runner.os == 'Windows'
      run: |
        pyinstaller main.py -F -w -n ShutdownTimer --add-data "shutdown_package;shutdown_package" --version-file file_version_info.txt

    - name: Build with PyInstaller (macOS/Linux)
      if: runner.os != 'Windows'
      run: |
        pyinstaller main.py -F -w -n ShutdownTimer-${{ runner.os }} --add-data "shutdown_package:shutdown_package"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ShutdownTimer-${{ matrix.os }}
        path: |
          dist/ShutdownTimer*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release Tag
      id: tag
      run: |
        echo "TAG_NAME=v$(date +'%Y.%m.%d')-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.tag.outputs.TAG_NAME }}
        name: Release ${{ steps.tag.outputs.TAG_NAME }}
        draft: false
        prerelease: false
        files: |
          artifacts/ShutdownTimer-windows-latest/ShutdownTimer.exe
          artifacts/ShutdownTimer-macos-latest/ShutdownTimer-macOS
          artifacts/ShutdownTimer-ubuntu-latest/ShutdownTimer-Linux
